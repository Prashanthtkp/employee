apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: tkprashanthcrg/my-app:d7fb34285d86f444ce77e5927125a4c6a82b99e8
        ports:
        - containerPort: 3000
  strategy:
    canary:
      stableService: frontend
      canaryService: frontend-canary
      trafficRouting:
        nginx:
          stableIngress: emp-ingress
      # Corrected: analysis belongs inside the canary block
     #analysis:
      # templates:
        # - templateName: success-rate-check
        # Optional: args to pass if your template uses them
      # args:
      #   - name: service-name
        #   value: frontend-canary
      steps:
      - setWeight: 20
      - pause: {} # This pauses until you manually promote in ArgoCD UI
      - setWeight: 50
      - pause: { duration: 2m }
      - setWeight: 100

